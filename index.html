<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Mike Battle Base Mobile</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#07111f;font-family:Arial,sans-serif;color:white;touch-action:none;-webkit-user-select:none;user-select:none}
canvas{display:block;width:100vw;height:100vh;touch-action:none}
#ui{position:fixed;inset:0;pointer-events:none}
#hud{position:absolute;left:12px;top:10px;font-weight:800;text-shadow:0 2px 4px #000;font-size:16px;line-height:1.25}
#gamepad{font-size:13px;color:#8cff9a}
#msg{position:absolute;left:50%;top:65px;transform:translateX(-50%);font-size:28px;font-weight:900;color:#ffe66d;text-shadow:0 2px 6px #000;text-align:center}
#cross{position:absolute;left:50%;top:50%;width:18px;height:18px;transform:translate(-50%,-50%);border:2px solid #fff;border-radius:50%;opacity:.8}
#joy{position:absolute;left:28px;bottom:36px;width:132px;height:132px;border-radius:50%;background:rgba(255,255,255,.13);border:2px solid rgba(255,255,255,.25);pointer-events:auto}
#knob{position:absolute;left:43px;top:43px;width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.62)}
.btn{position:absolute;width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.16);border:2px solid rgba(255,255,255,.3);pointer-events:auto;display:flex;align-items:center;justify-content:center;font-weight:900;text-shadow:0 2px 4px #000}
#fire{right:28px;bottom:68px;background:rgba(255,70,55,.32);font-size:16px}
#jump{right:112px;bottom:34px;font-size:14px}
#run{right:112px;bottom:126px;font-size:13px}
#reload{right:28px;top:92px;width:58px;height:58px;font-size:13px}
#lookzone{position:absolute;right:0;top:0;width:58vw;height:100vh;pointer-events:auto}
#tip{position:absolute;right:10px;top:10px;background:rgba(0,0,0,.35);padding:9px;border-radius:12px;font-size:12px;line-height:1.35;max-width:185px}
@media (max-width:700px){#tip{display:none}#msg{font-size:24px}}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <div id="hud">MIKE BATTLE BASE<br>Vida: <span id="hp">100</span> | Eliminados: <span id="kills">0</span><br><span id="gamepad">Gamepad: buscando...</span></div>
  <div id="tip">iPhone: joystick + botones<br>Gamepad: stick izq/der, R2 dispara, A salta<br>PC: WASD/mouse/click</div>
  <div id="msg"></div><div id="cross"></div>
  <div id="lookzone"></div>
  <div id="joy"><div id="knob"></div></div>
  <div id="fire" class="btn">FIRE</div>
  <div id="jump" class="btn">JUMP</div>
  <div id="run" class="btn">RUN</div>
  <div id="reload" class="btn">RESET</div>
</div>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const hpEl=document.getElementById('hp'),killsEl=document.getElementById('kills'),msg=document.getElementById('msg'),gpEl=document.getElementById('gamepad');
function resize(){canvas.width=innerWidth*devicePixelRatio;canvas.height=innerHeight*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0)}
addEventListener('resize',resize);resize();
let keys={},player,enemies,bullets,particles,kills,lastShot=0;
let touchMove={x:0,y:0,active:false},touchRun=false,touchJump=false,touchFire=false;
let lookId=null,lastLookX=0;
const joy=document.getElementById('joy'),knob=document.getElementById('knob'),lookzone=document.getElementById('lookzone');
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function reset(){player={x:0,y:0,z:0,vz:0,a:-Math.PI/2,hp:100};kills=0;bullets=[];particles=[];enemies=[];for(let i=0;i<12;i++)enemies.push(spawnEnemy());msg.textContent=''}
function spawnEnemy(){let ang=Math.random()*Math.PI*2,dist=550+Math.random()*1250;return{x:Math.cos(ang)*dist,y:Math.sin(ang)*dist,hp:3,hit:0}}
function shoot(){let now=performance.now();if(now-lastShot<160||player.hp<=0)return;lastShot=now;bullets.push({x:player.x+Math.cos(player.a)*42,y:player.y+Math.sin(player.a)*42,a:player.a,life:75});particles.push({x:player.x+Math.cos(player.a)*55,y:player.y+Math.sin(player.a)*55,life:10,type:'flash'}); if(navigator.vibrate)navigator.vibrate(18)}
function jump(){if(player.z===0)player.vz=12}
addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.key.toLowerCase()==='r')reset();if(e.key===' ')jump()});
addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
canvas.addEventListener('click',()=>canvas.requestPointerLock&&canvas.requestPointerLock());
addEventListener('mousemove',e=>{if(document.pointerLockElement===canvas)player.a+=e.movementX*0.003});
addEventListener('mousedown',shoot);
function joyMove(clientX,clientY){let r=joy.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;let dx=clientX-cx,dy=clientY-cy;let len=Math.hypot(dx,dy),max=48;if(len>max){dx=dx/len*max;dy=dy/len*max}knob.style.transform=`translate(${dx}px,${dy}px)`;touchMove.x=dx/max;touchMove.y=dy/max;touchMove.active=true}
function joyEnd(){knob.style.transform='translate(0,0)';touchMove.x=0;touchMove.y=0;touchMove.active=false}
joy.addEventListener('touchstart',e=>{e.preventDefault();let t=e.changedTouches[0];joyMove(t.clientX,t.clientY)},{passive:false});
joy.addEventListener('touchmove',e=>{e.preventDefault();let t=e.changedTouches[0];joyMove(t.clientX,t.clientY)},{passive:false});
joy.addEventListener('touchend',e=>{e.preventDefault();joyEnd()},{passive:false});
function bindBtn(id,on,off){let el=document.getElementById(id);el.addEventListener('touchstart',e=>{e.preventDefault();on();},{passive:false});el.addEventListener('touchend',e=>{e.preventDefault();off&&off();},{passive:false});el.addEventListener('mousedown',e=>{e.preventDefault();on();});el.addEventListener('mouseup',e=>{e.preventDefault();off&&off();});}
bindBtn('fire',()=>{touchFire=true;shoot()},()=>touchFire=false);bindBtn('jump',()=>{touchJump=true;jump()},()=>touchJump=false);bindBtn('run',()=>touchRun=true,()=>touchRun=false);bindBtn('reload',reset);
lookzone.addEventListener('touchstart',e=>{let t=e.changedTouches[0];lookId=t.identifier;lastLookX=t.clientX},{passive:false});
lookzone.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches){if(t.identifier===lookId){player.a+=(t.clientX-lastLookX)*0.006;lastLookX=t.clientX}}},{passive:false});
lookzone.addEventListener('touchend',()=>{lookId=null},{passive:false});
addEventListener('gamepadconnected',e=>{gpEl.textContent='Gamepad: conectado ✅'});addEventListener('gamepaddisconnected',e=>{gpEl.textContent='Gamepad: desconectado'});
function gamepadInput(){let gps=navigator.getGamepads?navigator.getGamepads():[];let g=[...gps].find(Boolean);if(!g){gpEl.textContent='Gamepad: buscando...';return {mx:0,my:0,look:0,run:false,fire:false,jump:false,reset:false}}gpEl.textContent='Gamepad: conectado ✅';let dead=.16,ax=i=>Math.abs(g.axes[i]||0)>dead?(g.axes[i]||0):0;let b=i=>g.buttons[i]&&g.buttons[i].pressed;return{mx:ax(0),my:ax(1),look:ax(2)||ax(3),run:b(10)||b(1),fire:b(7)||b(5)||b(0),jump:b(0)||b(2),reset:b(9)}}
function update(){let gp=gamepadInput();if(gp.reset)reset();if(gp.jump)jump();if(gp.fire||touchFire)shoot();player.a+=gp.look*0.045;let sp=(keys['shift']||touchRun||gp.run)?7:4,fw=0,st=0;if(keys['w'])fw+=1;if(keys['s'])fw-=1;if(keys['a'])st-=1;if(keys['d'])st+=1;fw+=-touchMove.y + -gp.my;st+=touchMove.x + gp.mx;fw=clamp(fw,-1,1);st=clamp(st,-1,1);player.x+=(Math.cos(player.a)*fw+Math.cos(player.a+Math.PI/2)*st)*sp;player.y+=(Math.sin(player.a)*fw+Math.sin(player.a+Math.PI/2)*st)*sp;player.z+=player.vz;player.vz-=.7;if(player.z<0){player.z=0;player.vz=0}for(const b of bullets){b.x+=Math.cos(b.a)*20;b.y+=Math.sin(b.a)*20;b.life--}bullets=bullets.filter(b=>b.life>0);for(const e of enemies){let ang=Math.atan2(player.y-e.y,player.x-e.x);e.x+=Math.cos(ang)*1.05;e.y+=Math.sin(ang)*1.05;if(e.hit>0)e.hit--;let d=Math.hypot(player.x-e.x,player.y-e.y);if(d<35)player.hp-=.11;for(const b of bullets){if(Math.hypot(b.x-e.x,b.y-e.y)<34){e.hp--;e.hit=10;b.life=0;particles.push({x:e.x,y:e.y,life:18,type:'hit'})}}}let before=enemies.length;enemies=enemies.filter(e=>e.hp>0);kills+=before-enemies.length;while(enemies.length<12)enemies.push(spawnEnemy());hpEl.textContent=Math.max(0,Math.floor(player.hp));killsEl.textContent=kills;if(player.hp<=0)msg.innerHTML='ELIMINADO<br>Presiona RESET';particles.forEach(p=>p.life--);particles=particles.filter(p=>p.life>0)}
function worldToScreen(x,y,z=0){let dx=x-player.x,dy=y-player.y,ca=Math.cos(-player.a),sa=Math.sin(-player.a),rx=dx*ca-dy*sa,ry=dx*sa+dy*ca,scale=500/(ry+700);return{x:innerWidth/2+rx*scale,y:innerHeight/2+130-z*scale-ry*.08,s:scale,front:ry>-650}}
function draw(){let g=ctx.createLinearGradient(0,0,0,innerHeight);g.addColorStop(0,'#0d4f9b');g.addColorStop(.55,'#58a9df');g.addColorStop(.56,'#2f8a3b');g.addColorStop(1,'#145526');ctx.fillStyle=g;ctx.fillRect(0,0,innerWidth,innerHeight);ctx.save();ctx.translate(innerWidth/2,innerHeight/2+130);ctx.rotate(-player.a);ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=2;for(let i=-2500;i<=2500;i+=120){ctx.beginPath();ctx.moveTo(i-player.x,-2500-player.y);ctx.lineTo(i-player.x,2500-player.y);ctx.stroke();ctx.beginPath();ctx.moveTo(-2500-player.x,i-player.y);ctx.lineTo(2500-player.x,i-player.y);ctx.stroke()}ctx.restore();let objs=[...enemies.map(o=>({...o,t:'e'})),...bullets.map(o=>({...o,t:'b'}))].sort((a,b)=>Math.hypot(b.x-player.x,b.y-player.y)-Math.hypot(a.x-player.x,a.y-player.y));for(const o of objs){let p=worldToScreen(o.x,o.y,0);if(!p.front)continue;if(o.t==='e'){ctx.fillStyle=o.hit?'#fffb7a':'#bf2b2b';ctx.beginPath();ctx.ellipse(p.x,p.y-45*p.s,24*p.s,50*p.s,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#111';ctx.fillRect(p.x-18*p.s,p.y-86*p.s,36*p.s,8*p.s);ctx.fillStyle='#43ff6b';ctx.fillRect(p.x-18*p.s,p.y-86*p.s,12*o.hp*p.s,8*p.s)}else{ctx.fillStyle='#ffe66d';ctx.beginPath();ctx.arc(p.x,p.y,5*p.s,0,Math.PI*2);ctx.fill()}}let cx=innerWidth/2,cy=innerHeight/2+110-player.z*2;ctx.fillStyle='#0736a2';ctx.fillRect(cx-26,cy-90,52,82);ctx.fillStyle='#111';ctx.fillRect(cx-24,cy-8,18,65);ctx.fillRect(cx+6,cy-8,18,65);ctx.fillStyle='#fff';ctx.fillRect(cx-30,cy+52,24,10);ctx.fillRect(cx+6,cy+52,24,10);ctx.fillStyle='#c91522';ctx.beginPath();ctx.arc(cx,cy-120,34,Math.PI,0);ctx.fill();ctx.fillRect(cx-30,cy-120,60,12);ctx.fillStyle='#1d130c';ctx.beginPath();ctx.arc(cx,cy-92,28,0,Math.PI*2);ctx.fill();ctx.fillStyle='#c98b5d';ctx.beginPath();ctx.arc(cx,cy-96,24,0,Math.PI*2);ctx.fill();ctx.fillStyle='#1b1b1b';ctx.fillRect(cx-12,cy-88,24,10);ctx.strokeStyle='#333';ctx.lineWidth=9;ctx.beginPath();ctx.moveTo(cx+25,cy-60);ctx.lineTo(cx+75,cy-76);ctx.stroke();for(const p of particles){let s=worldToScreen(p.x,p.y,0);ctx.fillStyle=p.type==='flash'?'#ffe66d':'#ff3b3b';ctx.globalAlpha=clamp(p.life/18,0,1);ctx.beginPath();ctx.arc(s.x,s.y,20*s.s,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}}
function loop(){if(player.hp>0)update();draw();requestAnimationFrame(loop)}reset();loop();
</script>
</body>
</html>
